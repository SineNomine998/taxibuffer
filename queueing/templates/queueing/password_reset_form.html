<!doctype html>
<html lang="nl">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>TAXIBUFFER — Wachtwoord vergeten</title>
    <style>
        body { font-family: Arial, sans-serif; background: #f7f7f9; color: #111; padding: 32px; }
        .container { max-width: 420px; margin: 0 auto; background: #fff; border-radius: 16px; padding: 24px; box-shadow: 0 14px 36px rgba(0, 0, 0, 0.12); }
        h1 { margin-bottom: 12px; font-size: 28px; }
        p { margin-bottom: 24px; color: #4a4a4a; }
        label { display: block; margin-bottom: 8px; font-weight: 700; }
        input { width: 100%; padding: 12px; border-radius: 10px; border: 1px solid #c1c4cd; margin-bottom: 16px; }
        button { width: 100%; background: #e0bd22; border: none; padding: 14px; border-radius: 999px; font-weight: 700; cursor: pointer; color: #111; }
        .link-row { margin-top: 16px; text-align: center; }
        .link-row a { color: #111; text-decoration: underline; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Wachtwoord vergeten</h1>
        <p>Vul hieronder je e-mailadres in. Je ontvangt een link om een nieuw wachtwoord in te stellen.</p>

        <form method="post">
            {% csrf_token %}
            {{ form.email.label_tag }}
            {{ form.email }}
            <button type="submit">Stuur reset-link</button>
        </form>

        <div class="link-row">
            <a href="{% url 'queueing:chauffeur_login' %}">Terug naar login</a>
        </div>
    </div>
</body>
</html>
