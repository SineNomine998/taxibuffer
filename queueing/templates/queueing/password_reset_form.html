<!doctype html>
<html lang="nl">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    {% load static %}
    <title>TAXIBUFFER — Wachtwoord vergeten</title>

    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'queueing/css/app_shell.css' %}">
    <link rel="stylesheet" href="{% static 'queueing/css/auth_pages.css' %}">
</head>

<body>
    <div class="app">
        {% include 'queueing/partials/app_header.html' %}

        <main class="content">
            <div>
                <h1 class="page-title">Wachtwoord vergeten</h1>
                <p class="page-subtitle">Vul uw e-mailadres in. U ontvangt een link om een nieuw wachtwoord in te stellen.</p>
            </div>

            <section class="card">
                <form method="post">
                    {% csrf_token %}

                    {{ form.email.errors }}
                    <label for="{{ form.email.id_for_label }}">E-mailadres</label>
                    {{ form.email }}

                    <button class="btn-primary" type="submit">Stuur reset-link</button>
                </form>

                <div class="link-row">
                    <a href="{% url 'queueing:chauffeur_login' %}">Terug naar login</a>
                </div>
            </section>
        </main>
    </div>
</body>

</html>
