<style>
  .bottom-nav {
    position: fixed;
    left: 0;
    right: 0;
    bottom: 0;
    height: 68px;
    background: linear-gradient(92.18deg, var(--gold-1) -4.05%, var(--gold-2) 116.02%);
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 4px;
    padding: 8px 8px calc(8px + env(safe-area-inset-bottom, 0px));
    z-index: 20;
    box-shadow: 0 -4px 14px rgba(0, 0, 0, 0.08);
  }

  .bottom-nav-link {
    text-decoration: none;
    color: #2f2f2f;
    border-radius: 12px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 3px;
    font-size: 10px;
    font-weight: 700;
    line-height: 1.1;
    border: 1px solid transparent;
    transition: background 0.2s ease, border-color 0.2s ease;
    min-width: 0;
    text-align: center;
    padding: 4px 2px;
  }

  .bottom-nav-link svg {
    width: 18px;
    height: 18px;
    stroke: currentColor;
    flex-shrink: 0;
  }

  .bottom-nav-link span {
    display: block;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .bottom-nav-link.active {
    background: rgba(255, 255, 255, 0.65);
    border-color: rgba(0, 0, 0, 0.12);
  }
</style>

<nav class="bottom-nav" aria-label="Navigatie">
  <a class="bottom-nav-link {% if active_tab == 'locations' %}active{% endif %}" href="{% url 'queueing:location_selection' %}">
    <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
      <path d="M12 21C12 21 18 15.8 18 10.8C18 7.13 15.31 4.5 12 4.5C8.69 4.5 6 7.13 6 10.8C6 15.8 12 21 12 21Z" stroke-width="1.9"/>
      <circle cx="12" cy="10.5" r="2.1" stroke-width="1.9"/>
    </svg>
    <span>Locaties</span>
  </a>

  <a class="bottom-nav-link {% if active_tab == 'queue' %}active{% endif %}" href="{% url 'queueing:queue_overview' %}">
    <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
      <path d="M5 8.5H19" stroke-width="1.9" stroke-linecap="round"/>
      <path d="M5 12H19" stroke-width="1.9" stroke-linecap="round"/>
      <path d="M5 15.5H14" stroke-width="1.9" stroke-linecap="round"/>
      <circle cx="17.5" cy="16" r="2.5" stroke-width="1.9"/>
    </svg>
    <span>Wachtrij</span>
  </a>

  <a class="bottom-nav-link {% if active_tab == 'numbers' %}active{% endif %}" href="{% url 'queueing:sequence_history' %}">
    <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
      <path d="M8 7H16" stroke-width="1.9" stroke-linecap="round"/>
      <path d="M8 12H16" stroke-width="1.9" stroke-linecap="round"/>
      <path d="M8 17H16" stroke-width="1.9" stroke-linecap="round"/>
      <path d="M5 7H5.01" stroke-width="1.9" stroke-linecap="round"/>
      <path d="M5 12H5.01" stroke-width="1.9" stroke-linecap="round"/>
      <path d="M5 17H5.01" stroke-width="1.9" stroke-linecap="round"/>
    </svg>
    <span>Nummers</span>
  </a>

  <a class="bottom-nav-link {% if active_tab == 'account' %}active{% endif %}" href="{% url 'queueing:account' %}">
    <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
      <circle cx="12" cy="8" r="3.3" stroke-width="1.9"/>
      <path d="M5.8 19.5C6.5 16.8 8.9 15 12 15C15.1 15 17.5 16.8 18.2 19.5" stroke-width="1.9" stroke-linecap="round"/>
    </svg>
    <span>Account</span>
  </a>
</nav>
