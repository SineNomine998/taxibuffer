<!doctype html>
<html lang="nl">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    {% load static %}
    <title>TAXIBUFFER - Voertuig Toevoegen</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold-1: #e0bd22;
            --gold-2: #fef508;
            --bg: #efeff3;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html,
        body {
            height: 100%;
        }

        body {
            font-family: "DM Sans", Arial, sans-serif;
            background: #eceff4;
            min-height: 100vh;
        }

        .app {
            width: 100%;
            max-width: 420px;
            min-height: 100vh;
            margin: 0 auto;
            background: var(--bg);
            position: relative;
            display: flex;
            flex-direction: column;
        }

        .header {
            height: 124px;
            background: linear-gradient(92.18deg, var(--gold-1) -4.05%, var(--gold-2) 116.02%);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            flex-shrink: 0;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .brand img {
            max-height: 20px;
            width: auto;
        }

        .brand-text {
            font-size: 37px;
            letter-spacing: 4px;
            font-weight: 800;
            line-height: 1;
            color: #000;
        }

        .content {
            padding: 30px 20px 96px;
            display: flex;
            flex-direction: column;
            gap: 14px;
            flex: 1;
        }

        h1 {
            color: #1a1a1a;
            font-size: 33px;
            line-height: 1.05;
            font-weight: 800;
        }

        .subtitle {
            color: #313131;
            font-size: 20px;
            line-height: 1.2;
            margin-top: -4px;
        }

        .message {
            background: rgba(255, 255, 255, 0.65);
            border-radius: 10px;
            color: #5d1b1b;
            padding: 10px 12px;
            font-size: 15px;
            font-weight: 700;
        }

        form {
            display: flex;
            flex-direction: column;
            gap: 20px;
            margin-top: 8px;
        }

        label {
            color: #232323;
            font-size: 21px;
            font-weight: 700;
            margin-bottom: 7px;
            display: block;
        }

        input[type="text"] {
            width: 100%;
            height: 42px;
            border-radius: 10px;
            border: 1px solid #a9acb9;
            background: #f1f1f1;
            padding: 0 16px;
            font-size: 21px;
            color: #222;
            outline: none;
        }

        select {
            width: 100%;
            height: 42px;
            border-radius: 10px;
            border: 1px solid #a9acb9;
            background: #f1f1f1;
            padding: 0 16px;
            font-size: 18px;
            color: #222;
            outline: none;
        }

        .checkbox-row {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-top: 2px;
            font-size: 21px;
            color: #222;
            font-weight: 600;
        }

        .checkbox-row input {
            width: 22px;
            height: 22px;
        }

        .actions {
            margin-top: 18px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .btn {
            width: 100%;
            height: 50px;
            border: none;
            border-radius: 999px;
            box-shadow: 0 6px 14px rgba(0, 0, 0, 0.18);
            color: #111;
            font-size: 25px;
            font-weight: 750;
            cursor: pointer;
        }

        .btn-save {
            background: linear-gradient(92.18deg, var(--gold-1) -4.05%, var(--gold-2) 116.02%);
        }

        .btn-back {
            background: linear-gradient(180deg, #f8f8f8 0%, #e7e7e7 100%);
        }

        .btn-back-wrap {
            text-decoration: none;
            display: block;
        }

        .footer {
            position: absolute;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(92.18deg, var(--gold-1) -4.05%, var(--gold-2) 116.02%);
            font-size: 12px;
            font-style: italic;
            color: #434343;
            text-align: left;
            padding: 12px 14px;
        }

        @media (max-width: 420px) {
            .brand-text {
                font-size: 19px;
                letter-spacing: 3px;
            }

            h1 {
                font-size: 30px;
            }

            .subtitle {
                font-size: 15px;
            }

            label {
                font-size: 17px;
            }

            input[type="text"] {
                font-size: 17px;
            }

            select {
                font-size: 17px;
            }

            .checkbox-row {
                font-size: 17px;
            }

            .btn {
                font-size: 20px;
                height: 40px;
            }

            .footer {
                font-size: 11px;
            }
        }
    </style>
</head>

<body>
    <div class="app">
        <header class="header">
            <div class="brand">
                <img src="{% static 'queueing/assets/logo.svg' %}" alt="Taxibuffer logo">
                <div class="brand-text">TAXIBUFFER</div>
            </div>
        </header>

        <main class="content">
            <h1>Voertuig toevoegen</h1>
            <div class="subtitle">Voeg kenteken en bijnaam toe</div>

            {% if messages %}
            {% for message in messages %}
            <div class="message">{{ message }}</div>
            {% endfor %}
            {% endif %}

            <form method="post">
                {% csrf_token %}
                <div>
                    <label for="nickname">Bijnaam*</label>
                    <input type="text" id="nickname" name="nickname" placeholder="Taxi 1" maxlength="60" required>
                </div>
                <div>
                    <label for="license_plate">Kenteken*</label>
                    <input type="text" id="license_plate" name="license_plate" placeholder="38HTTS" maxlength="20" required>
                </div>
                <div>
                    <label for="vehicle_type">Voertuigtype*</label>
                    <select id="vehicle_type" name="vehicle_type" required>
                        <option value="auto">Auto</option>
                        <option value="busje">Busje</option>
                    </select>
                </div>
                <label class="checkbox-row" for="set_as_favorite">
                    <input type="checkbox" id="set_as_favorite" name="set_as_favorite">
                    Maak dit mijn huidige voertuig
                </label>
                <div class="actions">
                    <button type="submit" class="btn btn-save">Opslaan</button>
                    <a class="btn-back-wrap" href="{% url 'queueing:sign_up3' %}">
                        <button type="button" class="btn btn-back">Terug</button>
                    </a>
                </div>
            </form>
        </main>

        <footer class="footer">Coding the Curbs in samenwerking met gemeente Rotterdam</footer>
    </div>
</body>

</html>
